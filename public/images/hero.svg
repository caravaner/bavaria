<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Sunrise over hills">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="60%" stop-color="#fcecb8"/>
      <stop offset="100%" stop-color="#f5d98a"/>
    </linearGradient>
    <radialGradient id="sunCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ecc04a"/>
      <stop offset="70%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#b48d18"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c9a227" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a9077"/>
      <stop offset="100%" stop-color="#558966"/>
    </linearGradient>
    <linearGradient id="hillMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3e7351"/>
      <stop offset="100%" stop-color="#2d5a3f"/>
    </linearGradient>
    <linearGradient id="hillNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#23472f"/>
      <stop offset="100%" stop-color="#1c3d2b"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c3d2b"/>
      <stop offset="100%" stop-color="#2d5a3f"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="1000" fill="url(#sky)"/>

  <!-- Sun glow halo -->
  <circle cx="500" cy="520" r="380" fill="url(#sunGlow)"/>
  <circle cx="500" cy="520" r="260" fill="url(#sunGlow)"/>

  <!-- Sun -->
  <circle cx="500" cy="520" r="140" fill="url(#sunCore)"/>

  <!-- Subtle stars/specks -->
  <circle cx="160" cy="180" r="1.5" fill="#c9a227" opacity="0.4"/>
  <circle cx="290" cy="120" r="2" fill="#c9a227" opacity="0.35"/>
  <circle cx="660" cy="220" r="1.5" fill="#c9a227" opacity="0.4"/>
  <circle cx="120" cy="380" r="1" fill="#c9a227" opacity="0.5"/>
  <circle cx="720" cy="380" r="1" fill="#c9a227" opacity="0.5"/>

  <!-- Far hills -->
  <path d="M 0 720 Q 180 640, 380 680 T 800 660 L 800 1000 L 0 1000 Z" fill="url(#hillFar)"/>

  <!-- Mid hills -->
  <path d="M 0 810 Q 220 720, 480 780 T 800 760 L 800 1000 L 0 1000 Z" fill="url(#hillMid)"/>

  <!-- Near hills (darkest) -->
  <path d="M 0 900 Q 240 830, 470 880 T 800 870 L 800 1000 L 0 1000 Z" fill="url(#hillNear)"/>

  <!-- Botanical accent: branching leaves bottom-left -->
  <g transform="translate(40 760)" opacity="0.85">
    <path d="M 0 220 C 20 160, 60 100, 130 60" stroke="#1c3d2b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- leaves on stem -->
    <ellipse cx="40" cy="170" rx="18" ry="8" fill="url(#leaf)" transform="rotate(-35 40 170)"/>
    <ellipse cx="70" cy="130" rx="22" ry="9" fill="url(#leaf)" transform="rotate(-30 70 130)"/>
    <ellipse cx="105" cy="90" rx="20" ry="8" fill="url(#leaf)" transform="rotate(-25 105 90)"/>
    <ellipse cx="135" cy="58" rx="16" ry="7" fill="url(#leaf)" transform="rotate(-20 135 58)"/>
  </g>

  <!-- Botanical accent: single leaf top-right -->
  <g transform="translate(660 110)" opacity="0.75">
    <path d="M 0 0 Q 30 60, 0 130 Q -30 60, 0 0 Z" fill="url(#leaf)"/>
    <path d="M 0 10 L 0 120" stroke="#fdf6e3" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
